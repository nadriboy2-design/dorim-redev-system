      - "【청산계약】 추가 청산금 발생 시 지급 시기·이자 조건 명확히"
      - "【조합 해산 결의】 잔여재산 처분 방법 정관에 따라 처리"
    proportional_rate_info:
      description: "최종 청산 단계 — 실제 비례율 vs 확정 비례율 차액 정산"
      final_calc:
        - "실제 비례율 = (실제 종후자산총가액 - 실제 총사업비) / 종전자산총가액 × 100"
        - "비례율 차이만큼 개인별 청산금 증감 재계산"
        - "과수령 조합원은 추가 납부, 과소수령 조합원은 추가 환급"
    relocation_info:
