      - "【명도합의서】 이주 거부 세대에 대한 강제 집행 근거 조항 삽입"
      - "【철거계약】 철거 범위·안전관리·사후 정리 의무 명확히 기재"
      - "【보상계약】 영업 손실 보상은 실 영업 기간만 인정, 과거 휴업 기간 제외"
    proportional_rate_info: null
    relocation_info:
      title: "이주비 집행 현황 관리"
      items:
        - "이주비 지급 대상: 분양신청 조합원 전원"
        - "지급 시기: 이주개시일로부터 30일 이내"
        - "이주비 대출금리 동결 조건 확인 (금리 상승 시 조합 부담 여부)"
        - "현금청산 조합원 이주비: 사업시행인가일 기준 감정가로 보상"
    hard_locks:
      contractor_selection: ALLOWED
      sale_announcement: REQUIRES_COST_VERIFICATION
    next_stage: STAGE_8_CONSTRUCTION

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
