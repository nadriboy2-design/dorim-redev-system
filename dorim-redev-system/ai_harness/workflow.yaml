# dorim-redev-system/ai_harness/workflow.yaml
project:
  name: "도림사거리 역세권 재개발"
  zone: "도림동 239-12"
  area_sqm: 59607.59
  excluded_zone: "도림동 133-1 (무관 구역 — 절대 혼입 금지)"
  lat: 37.5134
  lng: 126.8986

current_stage: STAGE_1_PRELIMINARY

# ─────────────────────────────────────────────────────────────────────────────
# 서울시 도시 및 주거환경정비법 9단계 워크플로우
# ─────────────────────────────────────────────────────────────────────────────
stages:

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  STAGE_1_PRELIMINARY:
    name: "정비구역 입안 (사전검토)"
    short: "① 구역입안"
    consent_threshold: 0.40
    sub_stages:
      - "사전검토 신청서 제출 (동의율 40% 필요)"
      - "서울시 사전검토회의 심의"
      - "주민공람·공고 (14일 이상)"
      - "정비구역 지정 고시"
    required_docs:
      - "정비계획 사전검토 신청서"
      - "역세권 장기전세주택 건립계획서"
      - "토지등소유자 명부"
      - "노후도 및 구역계 검토서"
      - "역세권 동의서 (40% 이상)"
    cautions:
      - "도림동 133-1 구역 좌표·소유자 데이터 혼입 절대 금지 (인허가 무효 위험)"
      - "역세권 장기전세 운영기준(2026.3.6.)상 1차 역세권 250m 이내 확인 필수"
      - "노후도 기준: 건축물 2/3 이상이 준공 20년 이상이어야 함"
      - "동의서는 토지등소유자 기준이며, 세입자 동의는 인정되지 않음"
      - "사전검토 신청 전 구역계 폴리곤 서울시 GIS포털 확인 필수"
      - "사전검토 동의율 40% 미달 시 신청 자체가 반려됨"
    contract_cautions:
      - "【동의서】 서명·날인 전 토지등기사항증명서와 성명·주소 일치 여부 확인"
      - "【동의서】 공유자가 있는 경우 공유자 전원의 동의 필요 (일부만 동의 무효)"
      - "【동의서】 유효기간 명시 필수 — 통상 2년, 기간 내 철회 시 동의율 재계산"
      - "【위임장】 대리인 동의 시 인감증명서(3개월 이내 발급) 반드시 첨부"
      - "【서면】 주민 개인정보(주민번호) 수집 시 개인정보보호법 동의서 별도 징구"
    proportional_rate_info: null
    relocation_info: null
    hard_locks:
      contractor_selection: BLOCKED
      sale_announcement: BLOCKED
    next_stage: STAGE_2_COMMITTEE

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  STAGE_2_COMMITTEE:
    name: "추진위원회 구성·승인"
    short: "② 추진위"
    consent_threshold: 0.50
    sub_stages:
      - "추진위원장 및 위원 선출 (총회)"
      - "추진위원회 운영규정 작성"
      - "서울시 승인 신청 (동의율 50% 필요)"
      - "추진위원회 운영 개시"
    required_docs:
      - "추진위원장·위원 명부 및 이력서"
      - "추진위원회 운영규정"
      - "창립 총회 회의록 (공증 필요)"
      - "토지등소유자 동의서 (50% 이상)"
      - "추진위원회 승인 신청서"
    cautions:
      - "추진위원회 구성원은 해당 구역 토지등소유자이어야 함 (세입자 불가)"
      - "위원장은 선출직이므로 총회 의사록에 선출 과정 명확히 기재"
      - "추진위 운영비 지출은 추후 조합 설립 후 정산 대상이므로 영수증 전산관리 필수"
      - "서울시 승인 이후 추진위원 변경 시 별도 변경 승인 필요"
      - "추진위 단계에서 시공사와의 어떠한 약정·MOU도 법적 효력 없음 (하드락 B 적용)"
    contract_cautions:
      - "【업무대행 계약】 용역업체 선정 시 추진위원회 의결 필수, 단독 계약 무효"
      - "【업무대행 계약】 계약기간·보수·해지조건 명확히 기재, 조합 설립 전 자동 만료 조항 삽입"
      - "【설계용역 계약】 기본설계 단계임을 명시, 실시설계로 자동 전환 조항 금지"
      - "【감정평가 계약】 감정평가법인 2개소 이상 선정, 평균값 적용 조건 명시"
      - "【회계감사 계약】 추진위 회계는 독립 공인회계사 감사 의무 — 내부 감사만으로 불충분"
    proportional_rate_info: null
    relocation_info: null
    hard_locks:
      contractor_selection: BLOCKED
      sale_announcement: BLOCKED
    next_stage: STAGE_3_ASSOCIATION

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  STAGE_3_ASSOCIATION:
    name: "조합 설립 인가"
    short: "③ 조합설립"
    consent_threshold: 0.75
    sub_stages:
      - "창립총회 개최 (동의율 75%·토지면적 1/2 이상)"
      - "조합 설립 인가 신청 (영등포구청)"
      - "조합설립 인가 고시"
      - "조합원 명부 확정 및 통보"
    required_docs:
      - "조합 정관"
      - "조합원 명부 (분양대상자·무허가건물 소유자 구분)"
      - "토지등소유자 동의서 (75% 이상)"
      - "창립총회 회의록 (공증)"
      - "임원 선임서 및 이력서"
      - "사업계획서 (초안)"
    cautions:
      - "토지등소유자 3/4 이상 + 토지면적 1/2 이상 두 요건 모두 충족 필요 (도정법 제35조)"
      - "무허가 건물 소유자는 조합원 포함 여부 별도 검토 필요 (1989.1.24. 이전 건축물 기준)"
      - "조합 정관 필수 기재사항 누락 시 인가 반려 — 서울시 표준 정관 사용 권장"
      - "조합설립 인가 후 30일 이내 법인 등기 의무 이행"
      - "조합원 확정 후 탈퇴는 원칙적 불가 (이후 현금청산으로 처리)"
      - "조합임원 보수 지급은 정관 및 총회 의결 필요 — 임의 지급 시 횡령 문제"
    contract_cautions:
      - "【정관】 '비례율 산정 방법' 조항 반드시 명시 (종전/종후 자산 산정 기준 포함)"
      - "【정관】 이주비 지급 기준·한도·시기 명확히 기재"
      - "【정관】 분양신청 기간·철회 조건·미신청자 현금청산 조건 구체적으로 규정"
      - "【임원계약】 임기·해임 요건·보수 상한액 명확히 설정 (총회 의결 사항)"
      - "【업무대행 계약 전환】 추진위 시절 계약을 조합명의로 전환 시 조합 이사회 의결 필수"
    proportional_rate_info:
      description: "조합 설립 단계에서 예비 비례율 산출 — 조합원 권리 보호의 기준선"
      formula: "비례율(%) = (종후자산총가액 - 총사업비) / 종전자산총가액 × 100"
      components:
        - "종전자산총가액: 감정평가법인 2개소 평균값 적용"
        - "종후자산총가액: 분양수입 + 임대수입 (역세권 장기전세 포함)"
        - "총사업비: 공사비 + 설계비 + 감리비 + 조합운영비 + 이주비이자 등"
      typical_range: "역세권 고밀개발의 경우 통상 105~120% 범위"
      note: "비례율 100% 이하 시 조합원 손실 발생 — 사업성 재검토 필요"
    relocation_info: null
    hard_locks:
      contractor_selection: ALLOWED
      sale_announcement: BLOCKED
    next_stage: STAGE_4_BUSINESS

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  STAGE_4_BUSINESS:
    name: "사업시행계획 인가"
    short: "④ 사업시행"
    sub_stages:
      - "정비사업 전문관리업자 선정"
      - "건축 기본설계 완료"
      - "환경영향·교통영향 평가"
      - "건축심의 (서울시 건축위원회)"
      - "사업시행계획 인가 신청"
      - "사업시행 인가 고시"
    required_docs:
      - "사업시행계획서"
      - "설계도서 (건축 기본설계)"
      - "환경영향평가서"
      - "교통영향분석서"
      - "사업시행 인가 신청서"
    cautions:
      - "건축심의는 서울시 건축위원회 심의로 평균 3~6개월 소요 예상"
      - "역세권 장기전세 인센티브 적용 시 장기전세 공급 비율 의무 준수 (용적률 초과분의 일정 비율)"
      - "법정 용적률 상한 700%(1차 역세권) 초과 설계 시 하드락 A 발동"
      - "친환경 건축물 인센티브: 환경·에너지·신재생에너지 중 2개 부문 이상 상향 등급 필요"
      - "사업시행계획 인가 후 3년 이내 착공하지 않으면 인가 효력 상실"
    contract_cautions:
      - "【설계계약】 기본설계·실시설계 별도 계약, 기본설계 완료 후 발주처 승인 절차 삽입"
      - "【설계계약】 설계변경 범위·절차·추가비용 기준 명확히 규정"
      - "【환경평가 계약】 주민설명회 개최 의무 및 이의신청 처리 절차 계약서에 명시"
      - "【전문관리업자 계약】 업무 범위·보고 주기·성과지표(KPI) 명확히 정의"
      - "【감리계약】 건설기술진흥법상 감리 자격 보유 여부 계약 전 확인"
    proportional_rate_info:
      description: "사업시행 인가 후 종후 예상 수입 확정 — 비례율 정밀 산출 가능"
      formula: "비례율(%) = (분양수입 + 임대수입 - 총사업비) / 종전자산총가액 × 100"
      components:
        - "분양수입: 일반분양 세대 × 분양단가 (건축심의 확정 후 산출)"
        - "임대수입: 역세권 장기전세 환산 임대료"
        - "총사업비: 공사비(기본설계 기준) + 부대비용 합계"
      note: "이 단계 비례율로 각 조합원 권리가액 잠정 확정"
    relocation_info: null
    hard_locks:
      contractor_selection: ALLOWED
      sale_announcement: BLOCKED
    next_stage: STAGE_5_CONTRACTOR

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  STAGE_5_CONTRACTOR:
    name: "시공사 선정"
    short: "⑤ 시공사"
    sub_stages:
      - "입찰공고 (30일 이상)"
      - "현장설명회 개최"
      - "입찰서류 접수 (기본설계도서·성능요구서·내역서)"
      - "총회 의결로 시공사 선정"
      - "공사도급 계약 체결"
    required_docs:
      - "기본설계도서"
      - "공동주택 성능요구서 (구조·내화·차음·에너지)"
      - "물량내역서 및 산출내역서"
      - "시공사 입찰공고문"
      - "총회 의결서 (시공사 선정)"
    cautions:
      - "【하드락 B】 조합설립인가 이전 시공사 선정 시도 — 자동 차단 (서울시 조례)"
      - "공사비 단가는 국토부 고시 기준 공사비 검토 의뢰 후 결정 권장"
      - "입찰 담합 방지: 최소 3개사 이상 경쟁 입찰, 단독 입찰 시 유찰 처리"
      - "시공사 재무건전성 확인 필수: 최근 3년 감사보고서, 신용등급 BBB+ 이상"
      - "하도급 비율 상한(50%) 계약서에 명시, 주요 공종 직접 시공 의무화"
      - "분양공고 전 공사비 검증(국토부 고시) 의무 — 미이행 시 분양 불가"
    contract_cautions:
      - "【도급계약】 공사비 조정 기준 명확히 — '물가변동 연동 조항' 적용 범위 한정"
      - "【도급계약】 이주비 대여 조건 (금리·한도·상환방식) 별도 특약으로 규정"
      - "【도급계약】 공사 지연 시 지체보상금 기준 명시 (일정 비율 × 공사비 × 지연일수)"
      - "【도급계약】 하자담보책임 기간: 내력구조부 10년, 방수 5년, 기타 1~2년 명기"
      - "【도급계약】 조합원 특별공급 옵션 사항 계약서 별표 형식으로 첨부"
      - "【도급계약】 분양 미달 시 미분양 처리 방법·조합 부담 한도 명확히 기재"
    proportional_rate_info:
      description: "시공사 선정 후 공사비 확정 → 비례율 최종 확정"
      formula: "비례율(%) = (종후자산총가액 - 확정 총사업비) / 종전자산총가액 × 100"
      components:
        - "확정 공사비: 도급계약금액 (부가세 별도)"
        - "설계·감리비: 통상 공사비의 3~5%"
        - "조합운영비: 총사업비의 2~3%"
        - "이주비 이자: 이주비 × 대출금리 × 이주기간"
        - "예비비: 총사업비의 3~5% 반영"
      typical_range: "확정 비례율이 100% 미만이면 조합총회 재의결 필요"
      note: "비례율 확정 후 개인별 권리가액 = 종전자산평가액 × 확정비례율/100"
    relocation_info:
      title: "이주비 지급 기준 (시공사 선정 단계 확정)"
      formula: "이주비 = 권리가액 × 지급비율 (통상 60~80%)"
      components:
        - "이주비 대출 한도: 권리가액의 60% (서울시 기준)"
        - "대출 금리: 시중은행 협약 금리 (통상 CD금리 + 1.0~1.5%)"
        - "이주비 이자는 총사업비에 포함 → 비례율에 영향"
        - "무허가건물 소유자: 이주비 지급 기준 별도 심의 필요"
      caution: "이주비는 조합원 권리이나, 분양 대상에서 제외되거나 현금청산 선택 시 이주비 지급 불가"
    hard_locks:
      contractor_selection: ALLOWED
      sale_announcement: REQUIRES_COST_VERIFICATION
    next_stage: STAGE_6_DISPOSAL

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  STAGE_6_DISPOSAL:
    name: "관리처분계획 인가"
    short: "⑥ 관리처분"
    sub_stages:
      - "분양신청 공고 및 접수 (30일 이상)"
      - "분양신청 결과 집계·분석"
      - "관리처분계획 수립 (비례율 확정)"
      - "한국부동산원 타당성 검토"
      - "총회 의결 (분양신청자 2/3 이상)"
      - "관리처분계획 인가 신청 및 고시"
    required_docs:
      - "관리처분계획서"
      - "분양신청 결과 명세서"
      - "한국부동산원 타당성 검토 결과서"
      - "감정평가서 (조합원 전원)"
      - "총회 의결서 (관리처분)"
      - "공사비 검증 결과서 (국토부 고시)"
    cautions:
      - "【하드락 C】 공사비 검증 결과서 미첨부 시 분양공고 자동 차단"
      - "분양신청 기간 종료 후 신청 철회 불가 (기간 내 철회만 가능)"
      - "미분양 신청자(현금청산자)에게 청산금 지급 시 현재 감정평가액 기준"
      - "관리처분 총회는 분양신청자 과반수 출석 + 출석 2/3 이상 찬성"
      - "사업비 증가로 비례율 5% 이상 변동 시 조합원 2/3 동의로 재의결"
      - "관리처분인가 후 90일 이내 이주 완료 원칙"
    contract_cautions:
      - "【분양계약】 청약 자격·면적·금액·납부일정 명확히 기재"
      - "【분양계약】 분양가 상한제 적용 여부 확인 (역세권 고밀개발 해당 가능)"
      - "【분양계약】 하자보증금 납부 조건 (입주 전 건축물 완공보증 확인)"
      - "【현금청산 계약】 청산금 지급 시기·이자 여부·지급방법 구체적으로 명시"
      - "【이주 합의서】 이주비 지급 조건·명도 기한·명도 지체 시 손해배상 규정"
      - "【세입자 이주비】 주거이전비·이사비 지급 기준은 공익사업보상법 준용"
    proportional_rate_info:
      description: "관리처분 단계 — 최종 확정 비례율 및 개인별 청산금 확정"
      formula: "비례율(%) = (종후자산총가액 - 총사업비) / 종전자산총가액 × 100"
      individual_calc:
        - "권리가액 = 종전자산평가액 × 최종비례율/100"
        - "청산금 (납부) = 분양예정가액 - 권리가액 > 0 → 조합원이 조합에 납부"
        - "청산금 (환급) = 분양예정가액 - 권리가액 < 0 → 조합이 조합원에게 지급"
        - "현금청산 선택 시: 청산금 = 종전자산평가액 × 비례율 (이주비 공제 후 지급)"
      note: "비례율은 소수점 둘째 자리까지 산정, 개인별 청산금은 1원 단위 확정"
    relocation_info:
      title: "이주 및 철거 단계 이주비 집행"
      formula: "이주비 = 권리가액 × 지급비율"
      items:
        - "이주비 대출: 시중은행 협약대출 (조합이 담보 제공)"
        - "주거이전비: 가구원 수 기준 3개월 가계지출비 (통계청 고시)"
        - "이사비: 주거전용 40㎡ 미만 → 60만원, 60㎡ 미만 → 80만원, 이상 → 100만원"
        - "영업손실 보상: 사업자등록 영업자 휴업보상 4개월분 영업이익"
        - "무허가건물 소유자: 이주비 지급 제외 원칙, 별도 협의 가능"
      caution: "이주비 미수령 조합원은 이주 의무 없이 버틸 경우 법원 명도소송 진행"
    hard_locks:
      contractor_selection: ALLOWED
      sale_announcement: REQUIRES_COST_VERIFICATION
    next_stage: STAGE_7_RELOCATION

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
